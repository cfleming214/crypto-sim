appId: com.simpledesignllc.cryptocomp
tags:
  - full
---
# Full: a brand-new user signs up and lands in the authenticated app.
# The username/password pool auto-confirms on signup (no email-code step), so a
# successful sign-up drops straight onto Home. We then open Profile to confirm
# the account is real — the sign-up wall is gone and the signed-in profile
# (with its sign-out button) renders instead.
- runFlow:
    file: ../helpers/sign-up-fresh.yaml

# helper already asserted we landed on Home (portfolio-rebalance-btn).
- tapOn:
    text: "Profile"      # tab bar label
- assertVisible: { id: "profile-signout-btn" }
