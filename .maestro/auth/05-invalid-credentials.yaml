appId: com.cfleming.cryptosim
tags:
  - full
---
# Full: signing in with wrong password shows an error.
- launchApp
- assertVisible: { id: "auth-email-input" }
- tapOn: { id: "auth-email-input" }
- inputText: "no-such-user-${Math.random().toString(36).slice(2, 6)}@example.com"
- tapOn: { id: "auth-password-input" }
- inputText: "WrongPassword1!"
- tapOn: { id: "auth-submit-btn" }

# Cognito returns NotAuthorizedException or UserNotFoundException — the alert
# title is "Error".
- assertVisible:
    text: "Error"
# Dismiss the alert and confirm we're still on AuthScreen.
- tapOn:
    text: "OK"
- assertVisible: { id: "auth-email-input" }
