appId: com.simpledesignllc.cryptocomp
tags:
  - full
---
# Full: signing in with wrong credentials shows an error.
# Reach the Auth modal through the guest sign-up wall on a gated tab.
- launchApp
- tapOn:
    text: "Profile"      # tab bar label
- tapOn: { id: "authwall-signin-btn" }
- assertVisible: { id: "auth-username-input" }
- tapOn: { id: "auth-username-input" }
- inputText: "no-such-user-${Math.random().toString(36).slice(2, 6)}@example.com"
- tapOn: { id: "auth-password-input" }
- inputText: "WrongPassword1!"
- tapOn: { id: "auth-submit-btn" }

# Cognito returns NotAuthorizedException or UserNotFoundException — the alert
# title is "Error".
- assertVisible:
    text: "Error"
# Dismiss the alert and confirm we're still on the Auth modal.
- tapOn:
    text: "OK"
- assertVisible: { id: "auth-username-input" }
