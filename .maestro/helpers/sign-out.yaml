appId: com.simpledesignllc.cryptocomp
---
# Navigates to Profile and signs out. The app stays in the main tabs (it no
# longer kicks back to a full-screen AuthScreen) — instead the Profile tab
# re-renders the guest sign-up wall.
- tapOn:
    text: "Profile"      # tab bar label
- assertVisible: { id: "profile-signout-btn" }
- tapOn: { id: "profile-signout-btn" }
# Confirmation alert appears
- tapOn:
    text: "Sign out"
# Back to guest: the Profile tab now shows the auth wall.
- assertVisible: { id: "authwall-signup-btn" }
