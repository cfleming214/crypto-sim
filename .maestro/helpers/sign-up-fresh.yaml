appId: com.simpledesignllc.cryptocomp
---
# Spawns a fresh test user and lands on PortfolioScreen (Home).
# Generates a random `test-{8-char-uuid}@example.com` value at runtime (used as
# the Cognito username) so parallel runs don't collide. Password is always
# `Test1234!` (meets the Cognito policy).
#
# Outputs (read in calling flows as ${output.testEmail}):
#   testEmail    e.g. test-a8b3f9c2@example.com
#   testPassword Test1234!
- evalScript: ${output.testEmail = 'test-' + Math.random().toString(36).slice(2, 10) + '@example.com'}
- evalScript: ${output.testPassword = 'Test1234!'}

- launchApp

# Guest lands on Home. Open a gated tab to surface the sign-up wall, then tap
# "Create account" — the wall opens the Auth modal already in signup mode, so
# there's no toggle to flip.
- tapOn:
    text: "Profile"      # tab bar label
- assertVisible: { id: "authwall-signup-btn" }
- tapOn: { id: "authwall-signup-btn" }

- assertVisible: { id: "auth-username-input" }
- tapOn: { id: "auth-username-input" }
- inputText: ${output.testEmail}
- tapOn: { id: "auth-password-input" }
- inputText: ${output.testPassword}
- tapOn: { id: "auth-submit-btn" }

# The pool has no required attributes and no login alias, so the user is
# CONFIRMED immediately and signed in — there is NO email-code step. The Auth
# modal dismisses; hop to Home so callers start on the portfolio.
- assertNotVisible: { id: "auth-username-input" }
- tapOn:
    text: "Home"
- assertVisible: { id: "portfolio-rebalance-btn" }
