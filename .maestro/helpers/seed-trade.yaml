appId: com.cfleming.cryptosim
---
# Performs one quick market trade on the given symbol. Useful for flows that
# need an existing trade to test against (view holding, activity history,
# trade detail screen).
#
# Caller passes via env:
#   SYMBOL   e.g. BTC
#   AMOUNT   dollar amount as a string e.g. "100"
#   SIDE     "buy" (default) — sell handled by a separate helper if needed
#
# (Maestro YAML doesn't allow ternaries inside an id: scalar — keeping the
# helper buy-only and using a sibling helper for sells avoids that pitfall.)
- tapOn: { text: "Trade" }
- tapOn: { id: "trade-buy-btn" }
- assertVisible: { id: "trade-place-order-btn" }

# Type the dollar amount one digit at a time via the NumPad.
- evalScript: ${output.digits = AMOUNT.split('')}
- evalScript: ${output.i = 0}
- repeat:
    times: ${output.digits.length}
    commands:
      - tapOn:
          id: "numpad-key-${output.digits[output.i]}"
      - evalScript: ${output.i = output.i + 1}
- tapOn: { id: "trade-place-order-btn" }
- assertVisible:
    text: "Order filled"
