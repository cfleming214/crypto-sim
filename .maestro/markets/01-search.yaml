appId: com.cfleming.cryptosim
tags:
  - full
---
- runFlow:
    file: ../helpers/sign-in.yaml
    env:
      EMAIL: ${MAESTRO_TEST_EMAIL || 'returning@example.com'}
      PASSWORD: ${MAESTRO_TEST_PASSWORD || 'Test1234!'}

- tapOn: { text: "Markets" }
- tapOn: { id: "markets-search-input" }
- inputText: "PEPE"
- assertVisible: { id: "markets-coin-row-PEPE" }
- assertNotVisible: { id: "markets-coin-row-BTC" }
