appId: com.simpledesignllc.cryptocomp
tags:
  - smoke
---
# Smoke: tap the star next to a coin in Markets to toggle the watchlist.
- runFlow:
    file: ../helpers/sign-in.yaml
    env:
      EMAIL: ${MAESTRO_TEST_EMAIL || 'returning@example.com'}
      PASSWORD: ${MAESTRO_TEST_PASSWORD || 'Test1234!'}

- tapOn: { text: "Markets" }
- assertVisible: { id: "markets-coin-row-SOL" }

# Toggle SOL into the watchlist (idempotent — flow asserts the action happened)
- tapOn: { id: "markets-watchlist-star-SOL" }

# Toggle back off so the test is non-destructive across re-runs
- tapOn: { id: "markets-watchlist-star-SOL" }

- assertVisible: { id: "markets-coin-row-SOL" }
