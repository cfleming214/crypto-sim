appId: com.cfleming.cryptosim
tags:
  - full
---
- runFlow:
    file: ../helpers/sign-in.yaml
    env:
      EMAIL: ${MAESTRO_TEST_EMAIL || 'returning@example.com'}
      PASSWORD: ${MAESTRO_TEST_PASSWORD || 'Test1234!'}

- tapOn: { text: "Profile" }
# Reset demo is under the MoreHorizontal "..." menu
- tapOn:
    text: "Reset demo ($10K)"
    optional: true

# Confirmation alert
- tapOn:
    text: "Reset"
    optional: true

# After reset, holdings are empty — rebalance button still visible (for cold start)
- tapOn: { text: "Home" }
- assertVisible: { id: "portfolio-rebalance-btn" }
