name: E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    name: Smoke (PR gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Map secret presence to env flags so the cloud steps can be gated on them.
    # `secrets.*` cannot be referenced directly in a step `if:`, but `env.*` can.
    env:
      HAS_MAESTRO_SECRETS: ${{ secrets.MAESTRO_CLOUD_API_KEY != '' }}
      HAS_AWS_SECRETS: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Check amplify_outputs.json is in sync with schema
        run: npm run check:amplify-outputs

      - name: Lint Maestro flows
        run: npm run test:e2e:lint

      - name: Install Maestro CLI
        if: env.HAS_MAESTRO_SECRETS == 'true'
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run smoke E2E (Maestro Cloud)
        if: env.HAS_MAESTRO_SECRETS == 'true'
        env:
          MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          MAESTRO_TEST_EMAIL:    ${{ secrets.MAESTRO_TEST_EMAIL }}
          MAESTRO_TEST_PASSWORD: ${{ secrets.MAESTRO_TEST_PASSWORD }}
        run: maestro cloud --include-tags=smoke .maestro

      - name: Smoke E2E skipped (no Maestro secrets)
        if: env.HAS_MAESTRO_SECRETS != 'true'
        run: echo "::warning::Smoke E2E skipped — MAESTRO_CLOUD_API_KEY is not configured. Type-check and Maestro flow lint still ran. Add the secret to enable the cloud run."

      - name: Cleanup test data
        if: always() && env.HAS_AWS_SECRETS == 'true'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            us-east-1
        run: node scripts/cleanup-test-data.mjs --yes

  nightly-full:
    name: Full E2E (nightly on main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [smoke]
    env:
      HAS_MAESTRO_SECRETS: ${{ secrets.MAESTRO_CLOUD_API_KEY != '' }}
      HAS_AWS_SECRETS: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Maestro CLI
        if: env.HAS_MAESTRO_SECRETS == 'true'
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run full E2E (Maestro Cloud)
        if: env.HAS_MAESTRO_SECRETS == 'true'
        env:
          MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          MAESTRO_TEST_EMAIL:    ${{ secrets.MAESTRO_TEST_EMAIL }}
          MAESTRO_TEST_PASSWORD: ${{ secrets.MAESTRO_TEST_PASSWORD }}
        run: maestro cloud --include-tags=full .maestro

      - name: Full E2E skipped (no Maestro secrets)
        if: env.HAS_MAESTRO_SECRETS != 'true'
        run: echo "::warning::Full E2E skipped — MAESTRO_CLOUD_API_KEY is not configured."

      - name: Cleanup test data
        if: always() && env.HAS_AWS_SECRETS == 'true'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            us-east-1
        run: node scripts/cleanup-test-data.mjs --yes
